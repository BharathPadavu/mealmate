{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>MealMate | Sign Up</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{% static 'delivery/css/auth.css' %}">

</head>

<body>

    <div class="signup-page">

        <div class="overlay"></div>

        <div class="signup-card">

            <div class="logo">

                <i class="fa-solid fa-utensils"></i>

            </div>

            <h2>Create Account</h2>

            <p>Join MealMate Today</p>

            <!-- Messages -->

            {% if messages %}

            {% for message in messages %}

            <div
                class="alert alert-{% if message.tags == 'error' %}danger{% else %}success{% endif %} alert-dismissible fade show">

                <i class="fa-solid fa-circle-info"></i>

                {{ message }}

                <button type="button" class="btn-close" data-bs-dismiss="alert">
                </button>

            </div>

            {% endfor %}

            {% endif %}

            <form action="{% url 'signup' %}" method="POST">

                {% csrf_token %}

                <div class="input-box">

                    <i class="fa-solid fa-user"></i>

                    <input type="text" name="username" placeholder="Username" required>

                </div>

                <div class="input-box">

                    <i class="fa-solid fa-envelope"></i>

                    <input type="email" name="email" placeholder="Email Address" required>

                </div>

                <div class="input-box">

                    <i class="fa-solid fa-phone"></i>

                    <input type="text" name="mobile" placeholder="Mobile Number" required>

                </div>

                <div class="input-box">

                    <i class="fa-solid fa-location-dot"></i>

                    <textarea name="address" placeholder="Address" required></textarea>

                </div>

                <div class="input-box">

                    <i class="fa-solid fa-lock"></i>

                    <input type="password" name="password" placeholder="Password" required>

                </div>

                <button class="login-btn" type="submit">

                    <i class="fa-solid fa-user-plus"></i>

                    Create Account

                </button>

            </form>

            <div class="bottom-text">

                Already have an account?

                <a href="{% url 'open_signin' %}">

                    Sign In

                </a>

            </div>

        </div>

    </div>

    <!-- Bootstrap JS -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
