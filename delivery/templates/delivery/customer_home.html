{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>MealMate | Home</title>

    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <!-- Google Font -->

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- CSS -->

    <link rel="stylesheet" href="{% static 'delivery/css/customer.css' %}">

</head>

<body>

    <!-- ================= NAVBAR ================= -->

    <nav class="navbar navbar-expand-lg navbar-dark">

        <div class="container">

            <a class="navbar-brand logo" href="/">
                <i class="fa-solid fa-utensils"></i>
                MealMate
            </a>

            <div class="ms-auto">

                <span class="welcome">

                    Hi,

                    <b>{{ username }}</b>

                </span>

            </div>

        </div>

    </nav>

    <!-- ================= HEADER ================= -->

    <section class="hero">

        <div class="container">

            <h1>

                Find Your Favourite Food

            </h1>

            <p>

                Order delicious food from the best restaurants near you.

            </p>

        </div>

    </section>

    <!-- ================= RESTAURANTS ================= -->

    <section class="restaurants">

        <div class="container">

            <div class="row">

                {% for r in restaurantList %}

                <div class="col-lg-4 col-md-6 mb-4">

                    <div class="restaurant-card">

                        <img src="{{ r.picture }}">

                        <div class="restaurant-body">

                            <h3>

                                {{ r.name }}

                            </h3>

                            <p>

                                <i class="fa-solid fa-bowl-food"></i>

                                {{ r.cuisine }}

                            </p>

                            <p class="rating">

                                ⭐ {{ r.rating }}/5

                            </p>

                            <a href="{% url 'view_menu' r.id username %}" class="btn view-btn">

                                View Menu

                            </a>

                        </div>

                    </div>

                </div>

                {% endfor %}

            </div>

        </div>

    </section>

</body>

</html>
