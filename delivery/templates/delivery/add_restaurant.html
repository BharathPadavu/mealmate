{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Add Restaurant | MealMate</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="{% static 'delivery/css/admin.css' %}">

</head>

<body>

    <nav class="navbar navbar-dark">

        <div class="container">

            <a class="navbar-brand logo" href="/">
                <i class="fa-solid fa-utensils"></i>
                MealMate
            </a>

        </div>

    </nav>

    <section class="form-section">

        <div class="container">

            <div class="form-card">

                <h2>

                    <i class="fa-solid fa-store"></i>

                    Add New Restaurant

                </h2>

                <form action="{% url 'add_restaurant' %}" method="POST">

                    {% csrf_token %}

                    <div class="mb-4">

                        <label>

                            Restaurant Name

                        </label>

                        <input type="text" name="name" class="form-control" placeholder="Enter restaurant name"
                            required>

                    </div>

                    <div class="mb-4">

                        <label>

                            Picture URL

                        </label>

                        <input type="text" name="picture" class="form-control"
                            placeholder="https://example.com/image.jpg" required>

                    </div>

                    <div class="mb-4">

                        <label>

                            Cuisine

                        </label>

                        <input type="text" name="cuisine" class="form-control" placeholder="Indian, Chinese, Italian..."
                            required>

                    </div>

                    <div class="mb-4">

                        <label>

                            Rating

                        </label>

                        <input type="number" name="rating" min="0" max="5" step="0.5" class="form-control"
                            placeholder="4.5" required>

                    </div>

                    <div class="text-center">

                        <button class="btn btn-main">

                            <i class="fa-solid fa-circle-plus"></i>

                            Add Restaurant

                        </button>

                    </div>

                </form>

            </div>

        </div>

    </section>

</body>

</html>
