{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>MealMate | Restaurants</title>

    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <!-- Google Font -->

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- CSS -->

    <link rel="stylesheet" href="{% static 'delivery/css/admin.css' %}">

</head>

<body>

    <nav class="navbar navbar-dark">

        <div class="container">

            <a class="navbar-brand logo" href="/">
                <i class="fa-solid fa-utensils"></i>
                MealMate
            </a>

        </div>

    </nav>

    <section class="restaurant-section">

        <div class="container">

            <h2 class="page-title">

                Restaurants

            </h2>

            <div class="row">

                {% for r in restaurantList %}

                <div class="col-lg-4 col-md-6 mb-4">

                    <div class="restaurant-card">

                        <img src="{{ r.picture }}">

                        <div class="card-body">

                            <h4>

                                {{ r.name }}

                            </h4>

                            <p>

                                <i class="fa-solid fa-bowl-food"></i>

                                {{ r.cuisine }}

                            </p>

                            <p>

                                ⭐ {{ r.rating }}/5

                            </p>

                            <div class="d-grid gap-2">

                                <a href="{% url 'open_update_restaurant' r.id %}" class="btn btn-warning">

                                    <i class="fa-solid fa-pen"></i>

                                    Update

                                </a>

                                <a href="{% url 'open_update_menu' r.id %}" class="btn btn-primary">

                                    <i class="fa-solid fa-utensils"></i>

                                    Update Menu

                                </a>

                                <a href="{% url 'delete_restaurant' r.id %}" class="btn btn-danger">

                                    <i class="fa-solid fa-trash"></i>

                                    Delete

                                </a>

                            </div>

                        </div>

                    </div>

                </div>

                {% endfor %}

            </div>

        </div>

    </section>

</body>

</html>
