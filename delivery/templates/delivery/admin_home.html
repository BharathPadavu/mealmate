{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>MealMate Admin</title>

    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <!-- Google Font -->

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- CSS -->

    <link rel="stylesheet" href="{% static 'delivery/css/admin.css' %}">

</head>

<body>

    <!-- Navbar -->

    <nav class="navbar navbar-expand-lg navbar-dark">

        <div class="container">

            <a class="navbar-brand logo" href="/">
                <i class="fa-solid fa-utensils"></i>
                MealMate
            </a>

        </div>

    </nav>

    <!-- Dashboard -->

    <section class="dashboard">

        <div class="container">

            <h1>

                Dashboard

            </h1>

            <p>

                Manage your restaurants and menu easily.

            </p>

            <div class="row mt-5">

                <!-- Card 1 -->

                <div class="col-md-6">

                    <div class="dashboard-card">

                        <div class="icon">

                            <i class="fa-solid fa-store"></i>

                        </div>

                        <h3>

                            Add Restaurant

                        </h3>

                        <p>

                            Register a new restaurant into MealMate.

                        </p>

                        <a href="{% url 'open_add_restaurant' %}" class="btn btn-main">

                            Open

                        </a>

                    </div>

                </div>

                <!-- Card 2 -->

                <div class="col-md-6">

                    <div class="dashboard-card">

                        <div class="icon">

                            <i class="fa-solid fa-list"></i>

                        </div>

                        <h3>

                            Show Restaurants

                        </h3>

                        <p>

                            View, update and manage restaurants.

                        </p>

                        <a href="{% url 'open_show_restaurant' %}" class="btn btn-main">

                            Open

                        </a>

                    </div>

                </div>

            </div>

        </div>

    </section>

</body>

</html>
