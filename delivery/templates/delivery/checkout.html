{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>MealMate | Checkout</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="{% static 'delivery/css/customer.css' %}">

    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>

</head>

<body>

    <nav class="navbar navbar-dark">

        <div class="container">

            <a class="navbar-brand logo" href="/">
                <i class="fa-solid fa-utensils"></i>
                MealMate
            </a>

        </div>

    </nav>

    <div class="container py-5">

        <div class="row">

            <div class="col-lg-8">

                <div class="summary-card">

                    <h2>

                        🧾 Order Summary

                    </h2>

                    <hr>

                    {% for item in cart_items %}

                    <div class="d-flex justify-content-between mb-3">

                        <div>

                            <b>{{ item.name }}</b>

                        </div>

                        <div>

                            ₹ {{ item.price }}

                        </div>

                    </div>

                    {% endfor %}

                    <hr>

                    <h3>

                        Total

                        <span class="float-end">

                            ₹ {{ total_price }}

                        </span>

                    </h3>

                </div>

            </div>

            <div class="col-lg-4">

                <div class="payment-card">

                    <div class="payment-icon">

                        <i class="fa-solid fa-credit-card"></i>

                    </div>

                    <h3>

                        Secure Payment

                    </h3>

                    <p>

                        Pay safely using Razorpay.

                    </p>

                    <button id="rzp-button" class="btn payment-btn">

                        <i class="fa-solid fa-lock"></i>

                        Pay ₹ {{ total_price }}

                    </button>

                </div>

            </div>

        </div>

    </div>

    {% if error %}

    <script>
        alert("{{ error }}");
    </script>

    {% endif %}

    <script>
        var options = {

            "key": "{{ razorpay_key_id }}",

            "amount": "{{ total_price|floatformat:2|add:'0.00'|floatformat:2 }}00",

            "currency": "INR",

            "name": "MealMate",

            "description": "Food Order",

            "order_id": "{{ order_id }}",

            "handler": function (response) {

                alert("Payment Successful");

                window.location.href = "{% url 'orders' username %}";

            },

            "prefill": {

                "name": "{{ username }}",

                "email": "customer@example.com",

                "contact": "9999999999"

            },

            "theme": {

                "color": "#ff6b35"

            }

        };

        var rzp = new Razorpay(options);

        document.getElementById("rzp-button").onclick = function (e) {

            rzp.open();

            e.preventDefault();

        }
    </script>

</body>

</html>
