{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Update Menu | MealMate</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="{% static 'delivery/css/admin.css' %}">

</head>

<body>

    <nav class="navbar navbar-dark">

        <div class="container">

            <a class="navbar-brand logo" href="/">
                <i class="fa-solid fa-utensils"></i>
                MealMate
            </a>

        </div>

    </nav>

    <div class="container py-5">

        <h2 class="page-title">

            🍽 Menu Items

        </h2>

        <div class="row">

            {% for item in itemList %}

            <div class="col-lg-4 col-md-6 mb-4">

                <div class="menu-card">

                    <img src="{{ item.picture }}">

                    <div class="menu-body">

                        <h4>{{ item.name }}</h4>

                        <p>

                            {{ item.description }}

                        </p>

                        <h5>

                            ₹ {{ item.price }}

                        </h5>

                        {% if item.vegeterian %}

                        <span class="badge bg-success">

                            Veg

                        </span>

                        {% else %}

                        <span class="badge bg-danger">

                            Non Veg

                        </span>

                        {% endif %}

                    </div>

                </div>

            </div>

            {% endfor %}

        </div>

        <hr class="my-5">

        <div class="form-card">

            <h2>

                <i class="fa-solid fa-plus"></i>

                Add Menu Item

            </h2>

            <form action="{% url 'update_menu' restaurant.id %}" method="POST">

                {% csrf_token %}

                <div class="row">

                    <div class="col-md-6 mb-3">

                        <label>

                            Item Name

                        </label>

                        <input type="text" name="name" class="form-control" required>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label>

                            Price

                        </label>

                        <input type="number" name="price" step="0.01" class="form-control" required>

                    </div>

                </div>

                <div class="mb-3">

                    <label>

                        Description

                    </label>

                    <textarea name="description" class="form-control" rows="4" required></textarea>

                </div>

                <div class="mb-3">

                    <label>

                        Picture URL

                    </label>

                    <input type="url" name="picture" class="form-control">

                </div>

                <div class="form-check mb-4">

                    <input type="checkbox" class="form-check-input" id="veg" name="vegeterian">

                    <label class="form-check-label" for="veg">

                        Vegetarian Item

                    </label>

                </div>

                <button class="btn btn-main">

                    <i class="fa-solid fa-circle-plus"></i>

                    Add Menu Item

                </button>

            </form>

        </div>

    </div>

</body>

</html>
